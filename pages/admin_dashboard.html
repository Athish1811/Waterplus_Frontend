<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | Water Plus</title>
  <link rel="stylesheet" href="../CSS/admin_dashboard.css">
</head>

<body>

  <header class="header">
    <h2>Admin Panel</h2>

    <nav class="menu">
      <a href="../pages/add_product.html">Add_Product</a>
      <a href="../pages/supplier.html">Supplier</a>
      <a href="../pages/admin_orders.html">Add_Orders</a>
      <a href="../index.html" class="logout">Logout</a>
    </nav>

  </header>

  <section class="admin">

    <h3>Dashboard Overview</h3>

    <div class="stats">

      <div class="box">
        Total Orders
        <br>
        <span id="totalOrders">0</span>
      </div>

      <div class="box">
        Pending Orders
        <br>
        <span id="pendingOrders">0</span>
      </div>

      <div class="box">
        Confirmed Orders
        <br>
        <span id="confirmedOrders">0</span>
      </div>

      <div class="box">
        Available Stock
        <br>
        <span id="availableStock">0</span>
      </div>

      <div class="box">
        Total Products
        <br>
        <span id="totalProducts">0</span>
      </div>

      <div class="box">
        Total Users
        <br>
        <span id="totalUsers">0</span>
      </div>

      <div class="box">
        Total Revenue
        <br>
        <span id="totalRevenue">0</span>
      </div>

    </div>

  </section>

  <script src="../JavaScript/config.js"></script>
  <script src="../JavaScript/admin_dashboard.js"></script>
  <script>
    document.querySelector('.logout')?.addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.clear();
      window.location.href = '../index.html';
    });
  </script>

</body>

</html>
