<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Plus | Order</title>
  <link rel="stylesheet" href="../CSS/orders.css" />
</head>

<body>

  <div class="order-card">
    <h2>Water Plus Order</h2>

    <div class="form-group">
      <label>Customer Name</label>
      <input type="text" placeholder="Enter your name" />
    </div>

    <div class="form-group">
      <label>Mobile Number</label>
      <input type="number" placeholder="Enter mobile number" />
    </div>

    <div class="form-group">
      <label>Water Type</label>
      <select id="productSelect">
        <option value="">Select water type</option>
      </select>
    </div>

    <div class="form-group">
      <label>Quantity</label>
      <input type="number" id="quantityInput" placeholder="Enter quantity" min="1" />
    </div>

    <div class="form-group">
      <label>Total Price</label>
      <div id="totalPriceDisplay" style="font-size: 1.2rem; font-weight: bold; color: #2ecc71;">₹0.00</div>
    </div>

    <div class="form-group">
      <label>Delivery Address</label>
      <textarea id="addressInput" placeholder="Enter delivery address"></textarea>
    </div>

    
    <button id="orderBtn" class="order-btn">Place Order</button>

    <div class="footer-text">Water Plus • Pure & Fresh</div>
    <a href="../pages/user_dashboard.html" class="home-btn">Go Back</a>

  </div>

</body>

<script src="../JavaScript/config.js"></script>
<script src="../JavaScript/order.js"></script>

</html>
