<!DOCTYPE html>
<html>
<head>
  <title>Add Product</title>
  <link rel="stylesheet" href="../CSS/add_product.css">
</head>
<body>

<h2>Add Product</h2>

<form id="productForm">
  <input id="name" placeholder="Product Name" required><br><br>
  <input id="description" placeholder="Description" required><br><br>
  <input id="size_liters" placeholder="Size (Liters)" type="number" step="0.1" required><br><br>
  <input id="price" placeholder="Price" type="number" step="0.01" required><br><br>
  <input id="stock_quantity" placeholder="Stock Quantity" type="number" min="0" required><br><br>
  <button type="submit">Add Product</button>
</form>

<script src="../JavaScript/config.js"></script>
<script src="../JavaScript/add_product.js"></script>
</body>
</html>
