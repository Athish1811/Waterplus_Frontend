<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>User Dashboard | Water Plus</title>
  <link rel="stylesheet" href="../CSS/user_dashboard.css" />
</head>

<body>
  <header class="header">
    <h2 class="logo">Water Plus</h2>

    <nav class="menu">
      <a href="../pages/user_dashboard.html">Dashboard</a>
      <a href="../pages/orders.html">Orders</a>
      <a href="../pages/contact.html">Contact</a>
      <a href="../pages/product.html">Products</a>
      <a href="../index.html" class="logout">Logout</a>
    </nav>
  </header>

  <section class="dashboard">
    <h3>Welcome, Customer 👋</h3>

    <div class="stats" style="display: flex; gap: 20px; margin-bottom: 30px;">
      <div class="box" style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
        Total Orders
        <br>
        <span id="orderCount" style="font-size: 24px; font-weight: bold;">0</span>
      </div>
      <div class="box" style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
        Pending Orders
        <br>
        <span id="pendingCount" style="font-size: 24px; font-weight: bold;">0</span>
      </div>
      <div class="box" style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
        Delivered Orders
        <br>
        <span id="deliveredCount" style="font-size: 24px; font-weight: bold;">0</span>
      </div>
      <div class="box" style="padding: 20px; border: 1px solid #ccc; border-radius: 8px; flex: 1; text-align: center;">
        Total Spent
        <br>
        <span id="totalSpent" style="font-size: 24px; font-weight: bold;">0</span>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <h4><a href="my_orders.html">Orders</a></h4>
        <p>View your order history</p>
      </div>

      <div class="card">
        <h4><a href="my_profile.html">My Profile</a></h4>
        <p>Update personal details</p>
      </div>
    </div>
  </section>
</body>
<script src="../JavaScript/config.js"></script>
<script src="../JavaScript/user_dashboard.js"></script>
<script>
  document.querySelector('.logout')?.addEventListener('click', function (e) {
    e.preventDefault();
    localStorage.clear();
    window.location.href = '../index.html';
  });
</script>

</html>
