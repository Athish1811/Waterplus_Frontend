<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watera Plus - Contact</title>
  <link rel="stylesheet" href="../CSS/contact.css" />
</head>
<body>

  <header class="header-container">
    <h1>Watera Plus</h1>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <nav class="menu" id="menu">
      <a href="../pages/contact.html" class="active">Contacts</a>
      <a href="../pages/orders.html">Make an Order</a>
      <a href="../pages/user_dashboard.html">Dashboard</a>
      <a href="../pages/product.html">Product</a>
      <a href="../pages/my_profile.html">Profile</a>
    </nav>
  </header>

  <div class="poster">
    <img src="../Assets/Watera_plus.png" class="poster-image" alt="Watera Plus Poster">
    <div class="poster-text">
      <h2>Experience the Pure & Freshness with <span>Watera Plus</span></h2>
      <p>Drink Pure, Stay Hydrated, Stay Healthy…!</p>
    </div>
  </div>

  <section class="contact-section">
    <h3>Drinking Mineral Water Dealers in Chennai</h3>

    <div class="contact-container">
      <div class="contact-image">
        <img src="../Assets/banner.png" alt="Certified Company" />
      </div>

      <!-- FORM -->
      <form class="contact-form">
        <h4>Send Your Message</h4>

        <input type="text" name="name" placeholder="Full Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="text" name="phone" placeholder="Phone" required />
        <input type="text" name="subject" placeholder="Subject" />
        <textarea name="message" placeholder="Enter Your Message" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2025 Watera Plus. All rights reserved.</p>
  </footer>

  <script src="../JavaScript/contact.js"></script>
</body>
</html>
